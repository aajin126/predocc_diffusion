model:
  base_learning_rate: 1e-4
  target: models.autoencoder.AutoencoderKL 
  params:
    monitor: "val/total_loss"
    embed_dim: 4
    lossconfig:
      target: modules.losses.LPIPSWithDiscriminator
      params:
        disc_start: 999999999999
        kl_weight: 0.000001
        disc_weight: 0.0
    ddconfig:
      double_z: True
      z_channels: 4
      resolution: 64
      in_channels: 1
      out_ch: 1
      ch: 128
      ch_mult: [1,2,4,4]  # num_down = len(ch_mult)-1
      num_res_blocks: 2
      attn_resolutions: []
      dropout: 0.0

data:
  target: main.DataModuleFromConfig
  params:
    batch_size: 16
    num_workers: 4
    train:
      target: data.dataloader.PredOccDataset
      params:
        data_root: "../data/OGM-datasets/OGM-Turtlebot2/train/"
        split: "train"
    validation:
      target: data.dataloader.PredOccDataset
      params:
        data_root: "../data/OGM-datasets/OGM-Turtlebot2/val/"
        split: "val"

lightning:
  trainer:
    max_epochs: 80
    check_val_every_n_epoch: 1
    
  callbacks:
    image_logger:
      target: main.ImageLogger
      params:
        batch_frequency: 50
        max_images: 10
        increase_log_steps: True

    train_loss_epoch_checkpoint:
      target: pytorch_lightning.callbacks.ModelCheckpoint
      params:
        filename: "trainloss-{epoch:06d}"
        monitor: "train/total_loss_epoch"
        save_top_k: -1
        every_n_epochs: 10
        save_last: false
        
  modelcheckpoint:
    params:
      monitor: "val/total_loss"
      save_top_k: 10
      save_last: true