model:
  base_learning_rate: 1.0e-04
  target: models.diffusion.ddpm.PredOccLatentDiffusion
  params:
    linear_start: 0.0015
    linear_end: 0.0195
    log_every_t: 200
    timesteps: 1000
    image_size: 16
    channels: 20
    conditioning_key: spade
    parameterization: eps
    monitor: val/loss
    use_ema: True
    scale_factor: 0.374106

    first_stage_ckpt_path: "./pretrained_models/first_stage_models/AE/v7.0/model.ckpt"

    first_stage_config:
      target: models.autoencoder.SequenceAutoencoderKL
      params:
        embed_dim: 2
        seq_len: 10
        monitor: val/total_loss
        in_channels: 1
        out_ch: 1
        resolution: 64
        num_hiddens: 128
        num_residual_layers: 2
        num_residual_hiddens: 64
        lossconfig:
          target: modules.losses.AELoss
          params:
            kl_weight: 1.0e-06

    cond_stage_config: 
      target: torch.nn.Identity 

    scheduler_config:
      target: lr_scheduler.LambdaLinearScheduler
      params:
        warm_up_steps: [ 10000 ]
        cycle_lengths: [ 10000000000000 ]
        f_start: [ 1.e-6 ]
        f_max: [ 1. ]
        f_min: [ 1. ]


    unet_config:
      target: modules.diffusionmodules.better.predocc_unet.UNetModel
      params:
        config:
          model:
            arch: unetmore
            version: DDPM
            gamma: False
            time_conditional: True
            dropout: 0.0
            sigma_dist: linear
            sigma_begin: 0.02
            sigma_end: 0.0001
            num_classes: 1000
            ema: True
            ema_rate: 0.999
            spec_norm: False
            normalization: InstanceNorm++
            nonlinearity: swish
            ngf: 128
            ch_mult: [1, 2]
            num_res_blocks: 1
            attn_resolutions: [4]
            n_head_channels: 16
            conditional: True
            noise_in_cond: False
            output_all_frames: False
            cond_emb: False
            spade: True
            spade_dim: 128
            cond_ch: 20
            sigma_max: 1.0
            sigma_min: 0.01
            num_scales: 1000
          data:
            channels: 2
            image_size: 16
            num_frames: 10
            num_frames_cond: 10
data:
  target: main.DataModuleFromConfig
  params:
    batch_size: 128
    num_workers: 4
    train:
      target: data.dataloader.PredOccDataset
      params:
        data_root: "../data/OGM-datasets/OGM-Turtlebot2/train/"
        split: "train"
    validation:
      target: data.dataloader.PredOccDataset
      params:
        data_root: "../data/OGM-datasets/OGM-Turtlebot2/val/"
        split: "val"
    test:
      target: data.dataloader.PredOccDataset
      params:
        data_root: "../data/OGM-datasets/OGM-Turtlebot2/test/"
        split: "test"
        
lightning:
  trainer:
    max_epochs: 80
    check_val_every_n_epoch: 1

    # accelerator: gpu
    # devices: 2
    # strategy: ddp_find_unused_parameters_true
    
  callbacks:
    image_logger:
      target: main.ImageLogger
      params:
        batch_frequency: 50
    
    train_loss_epoch_checkpoint:
      target: pytorch_lightning.callbacks.ModelCheckpoint
      params:
        filename: "trainloss-{epoch:06d}"
        monitor: "train/loss_epoch"
        save_top_k: -1
        every_n_epochs: 10
        save_last: false

  modelcheckpoint:
    params:
      monitor: "val/loss"
      save_top_k: 10
      save_last: true